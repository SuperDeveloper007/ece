<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sentaurus TCAD 阅读助手</title>
    <link rel="stylesheet" href="/pdfjs/web/pdf_viewer.css">
    <link rel="stylesheet" href="/app/styles.css">
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-brand">
        <div>
          <h1>Sentaurus TCAD 阅读助手</h1>
          <p id="status">正在加载 PDF...</p>
        </div>
      </div>
      <div class="toolbar-actions">
        <label class="file-button">
          上传 PDF
          <input id="upload-input" type="file" accept="application/pdf" multiple>
        </label>
        <div class="page-navigation">
          <button id="prev-page" type="button" title="上一页">上一页</button>
          <div class="page-input-wrapper">
            <input id="page-number" type="number" min="1" value="1" class="page-input">
            <span class="page-separator">/</span>
            <span id="page-count" class="page-total">0</span>
          </div>
          <button id="next-page" type="button" title="下一页">下一页</button>
        </div>
        <div class="zoom-control">
          <button id="zoom-out" type="button">-</button>
          <span id="zoom-value" class="zoom-value">120%</span>
          <button id="zoom-in" type="button">+</button>
        </div>
        <button id="toggle-theme" type="button" title="切换主题">切换主题</button>
      </div>
    </header>

    <main class="layout">
      <section class="reader" aria-label="PDF reader">
        <div id="page-shell" class="page-shell">
          <canvas id="pdf-canvas"></canvas>
          <div id="text-layer" class="textLayer"></div>
        </div>
      </section>

      <div
        id="panel-resizer"
        class="panel-resizer"
        role="separator"
        aria-label="调整右侧工具栏宽度"
        aria-orientation="vertical"
        tabindex="0"
      ></div>

      <aside class="assistant-panel" aria-label="Translation helper">
        <div class="panel-tabs">
          <button class="tab-button active" data-tab="selection">划词解释</button>
          <button class="tab-button" data-tab="glossary">术语库</button>
          <button class="tab-button" data-tab="ai">AI 助手</button>
          <button class="tab-button" data-tab="files">文件管理</button>
          <button class="tab-button" data-tab="notes">阅读笔记</button>
        </div>

        <div class="tab-content" id="tab-selection">
          <div class="selection-section">
            <div id="empty-selection" class="empty-state">
              <p>在 PDF 页面中选中英文术语或句子，或双击单词快速查询</p>
            </div>
            <div id="selection-card" class="selection-card hidden">
              <div class="selection-header">
                <span class="selection-label">选中文本</span>
                <button id="close-selection" class="close-button">×</button>
              </div>
              <div id="selected-text" class="selected-text"></div>
              <div class="button-row">
                <button id="copy-text" type="button" class="action-button">复制</button>
                <button id="copy-prompt" type="button" class="action-button">AI 提示词</button>
                <button id="ask-ai" type="button" class="action-button">问 AI</button>
                <button id="save-note" type="button" class="action-button">存笔记</button>
              </div>
              <div id="translation-result" class="translation-result hidden">
                <div class="translation-header">
                  <span class="translation-label">中文翻译</span>
                  <span class="translation-source">MyMemory API</span>
                </div>
                <div id="translation-text" class="translation-text"></div>
              </div>
            </div>
          </div>

          <div class="matches-section">
            <h3>术语库命中</h3>
            <div id="matches" class="matches"></div>
          </div>
        </div>

        <div class="tab-content hidden" id="tab-glossary">
          <div class="glossary-header">
            <h3>术语搜索</h3>
            <div class="category-filter">
              <button class="filter-button active" data-category="all">全部</button>
              <button class="filter-button" data-category="tool">工具</button>
              <button class="filter-button" data-category="device">器件</button>
              <button class="filter-button" data-category="visualization">可视化</button>
              <button class="filter-button" data-category="physics">物理</button>
            </div>
          </div>
          <input id="term-search" class="term-search" type="search" placeholder="搜索 TCAD / mesh / contour...">
          <div id="term-results" class="term-results"></div>
        </div>

        <div class="tab-content hidden" id="tab-ai">
          <div class="ai-chat-container">
            <div class="ai-chat-header">
              <h3>AI 助手</h3>
              <div class="ai-chat-header-actions">
                <button id="ai-new-session" type="button" class="ai-text-button">新会话</button>
                <button id="ai-clear-history" type="button" class="ai-text-button">清空历史</button>
                <div class="ai-status" id="ai-status">就绪</div>
              </div>
            </div>
            <div id="ai-chat-messages" class="ai-chat-messages"></div>
            <div class="ai-chat-input-section">
              <textarea id="ai-chat-input" class="ai-chat-input" placeholder="输入问题，AI 将结合当前选区、页面上下文和 TCAD/Sentaurus 术语库回答..." rows="3"></textarea>
              <button id="ai-send-button" type="button" class="action-button">发送</button>
            </div>
            <div class="ai-quick-actions">
              <button class="quick-action-button" data-prompt="解释当前选中的文本">解释选中内容</button>
              <button class="quick-action-button" data-prompt="总结当前页面的主要内容">总结当前页</button>
              <button class="quick-action-button" data-prompt="生成学习卡片">生成学习卡片</button>
              <button class="quick-action-button" data-prompt="列出后续问题">列出后续问题</button>
              <button class="quick-action-button" data-prompt="翻译并解释">翻译并解释</button>
            </div>
          </div>
        </div>

        <div class="tab-content hidden" id="tab-files">
          <div class="section-header">
            <h3>已上传的 PDF 文件</h3>
            <button id="refresh-files" type="button">刷新</button>
          </div>
          <div id="uploaded-files" class="uploaded-files"></div>
        </div>

        <div class="tab-content hidden" id="tab-notes">
          <div class="section-header">
            <h3>阅读笔记</h3>
            <button id="export-notes" type="button" class="action-button">导出</button>
          </div>
          <div id="notes" class="notes"></div>
        </div>
      </aside>
    </main>


    <script type="module" src="/app/app.js"></script>
  </body>
</html>
